<!DOCTYPE html>
<html lang="hr" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Moja rođendanska lista želja 🎁</title>
  <meta name="description" content="Lista stvari koje bih stvarno volio dobiti." />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['"Space Grotesk"', 'system-ui', 'sans-serif'],
            body: ['Inter', 'system-ui', 'sans-serif'],
          },
          keyframes: {
            floaty: {
              '0%,100%': { transform: 'translateY(0)' },
              '50%': { transform: 'translateY(-12px)' },
            },
            shimmer: {
              '0%': { backgroundPosition: '0% 50%' },
              '100%': { backgroundPosition: '200% 50%' },
            },
          },
          animation: {
            floaty: 'floaty 6s ease-in-out infinite',
            shimmer: 'shimmer 6s linear infinite',
          },
        },
      },
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  <style>
    body { background-color: #0a0a0f; }
    .gradient-text {
      background: linear-gradient(90deg,#a78bfa,#f472b6,#fb923c,#a78bfa);
      background-size: 200% auto;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .card-glow:hover { box-shadow: 0 0 0 1px rgba(167,139,250,.4), 0 20px 50px -20px rgba(167,139,250,.5); }
  </style>
</head>
<body class="font-body text-slate-200 antialiased selection:bg-fuchsia-500/30">

  <!-- background decoration -->
  <div class="pointer-events-none fixed inset-0 overflow-hidden">
    <div class="absolute -top-40 -left-40 h-96 w-96 rounded-full bg-violet-600/20 blur-3xl"></div>
    <div class="absolute top-1/3 -right-40 h-96 w-96 rounded-full bg-fuchsia-600/20 blur-3xl"></div>
    <div class="absolute bottom-0 left-1/3 h-96 w-96 rounded-full bg-orange-500/10 blur-3xl"></div>
  </div>

  <main class="relative mx-auto max-w-5xl px-5 py-16 sm:py-24">

    <!-- HERO -->
    <header class="mb-16 text-center">
      <div class="mb-6 inline-block animate-floaty text-6xl sm:text-7xl">🎁</div>
      <h1 class="font-display text-4xl font-bold leading-tight sm:text-6xl">
        Moja <span class="gradient-text animate-shimmer">rođendanska</span> lista želja
      </h1>
      <p class="mx-auto mt-5 max-w-xl text-base text-slate-400 sm:text-lg">
        Svake godine netko me pita što želim i mozak mi se isprazni.
        Zato — evo liste koju stalno nadopunjavam. Spremi je, bez pritiska, samo ideje. 💛
      </p>

      <!-- filter pills -->
      <div id="filters" class="mt-9 flex flex-wrap justify-center gap-2"></div>
    </header>

    <!-- WISH GRID -->
    <section id="wishlist" class="grid gap-5 sm:grid-cols-2"></section>

    <p id="empty" class="hidden py-16 text-center text-slate-500">Još ništa u ovoj kategoriji 🤷</p>

    <!-- FOOTER -->
    <footer class="mt-20 border-t border-white/5 pt-8 text-center text-sm text-slate-500">
      <p>Napravljeno uz tortu i dobre namjere 🍰 · Zadnja izmjena <span id="updated"></span></p>
    </footer>
  </main>

  <script>
    /* ──────────────────────────────────────────────────────────────
       OVDJE UREĐUJ SVOJE ŽELJE.  Slobodno dodaj / makni stavke tijekom godine.
         title    – što je to
         note     – neobavezna napomena (veličina, boja, zašto, itd.)
         price    – "$" | "$$" | "$$$"  (okvirni budžet, neobavezno)
         category – bilo koja oznaka; automatski postaje filter
         link     – neobavezni URL (kartica tada postaje klikabilna)
       ────────────────────────────────────────────────────────────── */
    const LAST_UPDATED = "lipanj 2026.";

    const WISHES = [
      { title: "SteelSeries Arctis jastučići za slušalice", note: "AirWeave materijal, za Arctis model", price: "$", category: "Gaming", link: "https://steelseries.com/en-hr/gaming-accessories/arctis-ear-cushions?material=airweave&model=Arctis" },
      { title: "Novo staklo za ekran iPhonea", note: "", price: "", category: "Tehnologija", link: "" },
    ];

    /* ── rendering ────────────────────────────────────────────────── */
    const PRICE_LABEL = { "$": "Pristupačno", "$$": "Srednje", "$$$": "Luksuz" };
    const PRICE_STYLE = {
      "$":   "bg-emerald-500/10 text-emerald-300 ring-emerald-500/20",
      "$$":  "bg-amber-500/10 text-amber-300 ring-amber-500/20",
      "$$$": "bg-rose-500/10 text-rose-300 ring-rose-500/20",
    };

    const grid = document.getElementById("wishlist");
    const filterBox = document.getElementById("filters");
    const emptyMsg = document.getElementById("empty");
    document.getElementById("updated").textContent = LAST_UPDATED;

    const categories = ["Sve", ...new Set(WISHES.map(w => w.category))];
    let active = "Sve";

    function pillClass(on) {
      return "rounded-full px-4 py-1.5 text-sm font-medium transition " +
        (on ? "bg-white text-slate-900 shadow-lg shadow-white/10"
            : "bg-white/5 text-slate-300 ring-1 ring-white/10 hover:bg-white/10");
    }

    function renderFilters() {
      filterBox.innerHTML = "";
      categories.forEach(cat => {
        const b = document.createElement("button");
        b.textContent = cat;
        b.className = pillClass(cat === active);
        b.onclick = () => { active = cat; renderFilters(); renderWishes(); };
        filterBox.appendChild(b);
      });
    }

    function card(w) {
      const tag = el("div", "");
      const priced = w.price && PRICE_STYLE[w.price]
        ? `<span class="rounded-full px-2.5 py-1 text-xs font-semibold ring-1 ${PRICE_STYLE[w.price]}">${PRICE_LABEL[w.price]}</span>`
        : "";
      const inner = `
        <div class="flex items-start justify-between gap-3">
          <span class="rounded-md bg-white/5 px-2 py-1 text-xs font-medium text-slate-400 ring-1 ring-white/10">${w.category}</span>
          ${priced}
        </div>
        <h3 class="mt-4 font-display text-xl font-semibold text-slate-100">${w.title}</h3>
        ${w.note ? `<p class="mt-2 text-sm leading-relaxed text-slate-400">${w.note}</p>` : ""}
        ${w.link ? `<span class="mt-4 inline-flex items-center gap-1 text-sm font-medium text-fuchsia-300">Pogledaj →</span>` : ""}
      `;
      const base = "group block rounded-2xl border border-white/10 bg-white/[.03] p-6 transition duration-300 card-glow hover:-translate-y-1";
      if (w.link) {
        const a = el("a", base);
        a.href = w.link; a.target = "_blank"; a.rel = "noopener";
        a.innerHTML = inner;
        return a;
      }
      const d = el("div", base);
      d.innerHTML = inner;
      return d;
    }

    function el(tag, cls) { const e = document.createElement(tag); e.className = cls; return e; }

    function renderWishes() {
      const list = active === "Sve" ? WISHES : WISHES.filter(w => w.category === active);
      grid.innerHTML = "";
      list.forEach(w => grid.appendChild(card(w)));
      emptyMsg.classList.toggle("hidden", list.length > 0);
    }

    renderFilters();
    renderWishes();
  </script>
</body>
</html>
